<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventory Sync Console</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Inventory Sync Console</h1>
      <p class="hint">
        Frontend deployed on Render, backend connected via ngrok/public API URL.
      </p>

      <section class="panel">
        <h2>Connection</h2>
        <div id="connection-status">Checking connection...</div>
      </section>

      <section class="panel actions">
        <h2>Actions</h2>
        <button id="sync-now">Run Sync Now</button>
        <button id="refresh">Refresh Status</button>
      </section>

      <section class="panel">
        <h2>Shopify & Billing</h2>
        <div id="integrations"></div>
      </section>

      <section class="panel">
        <h2>Sync Status</h2>
        <pre id="sync-status"></pre>
      </section>
    </main>

    <script src="./runtime-config.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
